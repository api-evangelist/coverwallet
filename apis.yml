aid: coverwallet
name: CoverWallet
description: CoverWallet, an Aon company, is a digital insurance marketplace with a
  REST API for quoting, binding, and managing small business insurance policies across
  multiple carriers. The platform supports general liability, business owners policy
  (BOP), professional liability, workers compensation, commercial property, and other
  commercial lines. Partners can integrate real-time quoting, underwriting, binding,
  billing, and servicing capabilities directly into their applications.
